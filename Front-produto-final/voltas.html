<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voltas | Sakura Racing</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  
  <style>
    /* RESET & VARIÁVEIS */
    :root {
      --rosa-neon: #ff1493;
      --rosa-claro: #ffb7c5;
      --dark-bg: #050505;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .navbar{
  position:fixed;top:0;right:-320px;
  width:320px;height:100%;
  background:rgba(6,6,8,0.95);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border-left:1px solid var(--border-pink);
  z-index:1000;
  padding:100px 40px 40px;
  display:flex;flex-direction:column;gap:8px;
  transition:right 0.5s var(--ease);
}
.navbar::before{
  content:'';
  position:absolute;top:0;left:0;
  width:1px;height:100%;
  background:linear-gradient(to bottom,transparent,var(--sakura),transparent);
  opacity:.5;
}
.navbar.open{right:0}

.nav-link{
  text-decoration:none;
  color:var(--text-mid);
  font-size:0.9rem;font-weight:600;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:14px 16px;
  border-radius:10px;
  transition:var(--t);
  display:flex;align-items:center;gap:12px;
  position:relative;overflow:hidden;
}
.nav-link::before{
  content:'';
  position:absolute;inset:0;
  background:var(--sakura-dim);
  transform:translateX(-100%);
  transition:transform 0.4s var(--ease);
  border-radius:10px;
}
.nav-link:hover{color:var(--text)}
.nav-link:hover::before{transform:translateX(0)}
.nav-link .icon{font-size:14px;opacity:.7}
.nav-sep{height:1px;background:var(--border);margin:10px 0}
.nav-danger{color:var(--danger)!important;margin-top:auto}

    body {
      font-family: 'Montserrat', sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      background-color: var(--dark-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* FUNDO E CANVAS (Mantendo a imersão visual) */
    .fundo-realista {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1522383225653-ed111181a951?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
      filter: brightness(0.25) contrast(1.2);
      z-index: -3;
    }

    #sakura-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* LINK DE VOLTAR OPCIONAL (Caso precise navegar) */
    .voltar-topo {
      position: absolute;
      top: 30px;
      left: 40px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s ease;
      z-index: 5;
    }

    .voltar-topo:hover {
      color: var(--rosa-neon);
    }

    /* PAINEL CENTRAL (Glassmorphism para o Card de Registro) */
    .centro {
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 2;
    }

    .card-registro {
      background: rgba(15, 15, 15, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 20, 147, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 20, 147, 0.05);
      width: 90%;
      max-width: 420px;
      animation: fadeIn 1s ease-out;
    }

    .card-registro h2 {
      font-family: 'Syncopate', sans-serif;
      font-size: 1.6rem;
      margin-bottom: 35px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
    }

    /* ÁREA DOS INPUTS */
    .inputs-row {
      display: flex;
      flex-direction: column;
      gap: 20px; /* Substitui o <br> por um espaçamento mais limpo e controlado */
      margin-bottom: 35px;
    }

    input {
      width: 100%;
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    input:focus {
      border-color: var(--rosa-neon);
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
    }

    /* BOTÃO REGISTRAR */
    .btn {
      display: block;
      width: 100%;
      padding: 16px 20px;
      background: transparent;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid var(--rosa-neon);
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 20, 147, 0.4), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover {
      background: var(--rosa-neon);
      color: #050505;
      box-shadow: 0 0 20px var(--rosa-neon);
      transform: translateY(-3px);
    }

    .btn:hover::before {
      left: 100%;
    }

    /* ANIMAÇÃO DE ENTRADA */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="fundo-realista"></div>
  <canvas id="sakura-canvas"></canvas>
  
  <a href="menu.html" class="voltar-topo">← Voltar</a>

  <div class="centro">
    <div class="card-registro">
      <h2>Registrar Volta</h2>
      
      <div class="inputs-row">
        <input type="text" placeholder="ID do corredor">
        <input type="text" placeholder="Data inicio">
        <input type="text" placeholder="data fim">
        <input type="text" placeholder="Tempo (s)">
      </div>

      <a class="btn">Registrar</a>
    </div>
  </div>
  <nav class="navbar" id="navbar" aria-label="Navegação principal">
    <a href="dashboard.html" class="nav-link" onclick="closeNav()">
      <span class="icon">◈</span> Dashboard
    </a>
    <a href="ranking.html" class="nav-link">
      <span class="icon">◉</span> Ranking Global
    </a>
    <a href="#" class="nav-link" onclick="openModal();closeNav()">
      <span class="icon">＋</span> Novo Corredor
    </a>
    <div class="nav-sep"></div>
    <a href="#" class="nav-link nav-danger">
      <span class="icon">⏻</span> Sair do Sistema
    </a>
  </nav>

  <script>
    /* =======================================================
       CANVAS 2D - PÉTALAS CAINDO PARA MANTER A IMERSÃO
       ======================================================= */
    const canvas = document.getElementById('sakura-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let petals = [];
    const NUM_PETALS = 50;

    function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    class Petal {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height - height;
            this.z = Math.random() * 0.6 + 0.2;
            this.vx = (Math.random() - 0.5) * 1.2;
            this.vy = (Math.random() * 1.5 + 0.5) * this.z;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.03;
            this.flip = Math.random() * Math.PI * 2;
            this.flipSpeed = (Math.random() - 0.5) * 0.03;
        }

        update() {
            this.x += this.vx + Math.sin(this.y * 0.01) * 0.5;
            this.y += this.vy;
            this.rotation += this.rotationSpeed;
            this.flip += this.flipSpeed;

            if (this.y > height + 20 || this.x < -20 || this.x > width + 20) {
                this.x = Math.random() * width;
                this.y = -20;
                this.vx = (Math.random() - 0.5) * 1.2;
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.scale(this.z, this.z * Math.abs(Math.cos(this.flip)));

            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.bezierCurveTo(10, -10, 15, 0, 10, 10);
            ctx.bezierCurveTo(5, 15, -5, 15, -10, 10);
            ctx.bezierCurveTo(-15, 0, -10, -10, 0, -10);
            
            let gradient = ctx.createLinearGradient(0, -10, 0, 10);
            gradient.addColorStop(0, 'rgba(255, 183, 197, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 20, 147, 0.6)');

            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.restore();
        }
    }

    function init2D() {
        resizeCanvas();
        petals = [];
        for (let i = 0; i < NUM_PETALS; i++) {
            petals.push(new Petal());
        }
    }

    function animate2D() {
        ctx.clearRect(0, 0, width, height);
        petals.forEach(petal => {
            petal.update();
            petal.draw();
        });
        requestAnimationFrame(animate2D);
    }

    window.addEventListener('resize', resizeCanvas);
    init2D();
    animate2D();
  </script>
</body>
</html>
