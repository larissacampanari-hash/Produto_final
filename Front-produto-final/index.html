<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakura Racing</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  
  <style>
    /* RESET & VARIÁVEIS */
    :root {
      --rosa-neon: #ff1493;
      --rosa-claro: #ffb7c5;
      --dark-bg: #050505;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      background-color: var(--dark-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* FUNDO E CANVAS */
    .fundo-realista {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1522383225653-ed111181a951?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
      filter: brightness(0.25) contrast(1.2);
      z-index: -3;
    }

    #sakura-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* PAINEL CENTRAL (Glassmorphism) */
    .centro {
      background: rgba(15, 15, 15, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 20, 147, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 20, 147, 0.05);
      z-index: 2;
      width: 90%;
      max-width: 450px;
      animation: fadeIn 1s ease-out;
    }

    .centro h2 {
      font-family: 'Syncopate', sans-serif;
      font-size: 1.6rem;
      margin-bottom: 10px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
      line-height: 1.4;
    }

    /* ESTILIZAÇÃO DO TEXTO */
    .centro p {
      font-size: 0.95rem;
      color: var(--rosa-claro);
      margin-top: 25px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
    }

    /* BOTÕES NEON CYBERPUNK */
    .btn {
      display: block;
      width: 100%;
      padding: 16px 20px;
      background: transparent;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid var(--rosa-neon);
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 20, 147, 0.4), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover {
      background: var(--rosa-neon);
      color: #050505;
      box-shadow: 0 0 20px var(--rosa-neon);
      transform: translateY(-3px);
    }

    .btn:hover::before {
      left: 100%;
    }

    /* ANIMAÇÃO DE ENTRADA */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="fundo-realista"></div>
  <canvas id="sakura-canvas"></canvas>

  <div class="centro">
    <h2>Bem vindo ao Sakura Racing</h2>
    <br>
    <p>Não tem cadastro?</p>
    <a href="cadastrouser.html" class="btn">Cadastrar</a>
    <p>Já tem cadastro?</p>
    <a href="login.html" class="btn">Login</a>
  </div>

  <script>
    /* =======================================================
       CANVAS 2D - PÉTALAS CAINDO PARA MANTER A IMERSÃO
       ======================================================= */
    const canvas = document.getElementById('sakura-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let petals = [];
    const NUM_PETALS = 50;

    function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    class Petal {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height - height;
            this.z = Math.random() * 0.6 + 0.2;
            this.vx = (Math.random() - 0.5) * 1.2;
            this.vy = (Math.random() * 1.5 + 0.5) * this.z;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.03;
            this.flip = Math.random() * Math.PI * 2;
            this.flipSpeed = (Math.random() - 0.5) * 0.03;
        }

        update() {
            this.x += this.vx + Math.sin(this.y * 0.01) * 0.5;
            this.y += this.vy;
            this.rotation += this.rotationSpeed;
            this.flip += this.flipSpeed;

            if (this.y > height + 20 || this.x < -20 || this.x > width + 20) {
                this.x = Math.random() * width;
                this.y = -20;
                this.vx = (Math.random() - 0.5) * 1.2;
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.scale(this.z, this.z * Math.abs(Math.cos(this.flip)));

            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.bezierCurveTo(10, -10, 15, 0, 10, 10);
            ctx.bezierCurveTo(5, 15, -5, 15, -10, 10);
            ctx.bezierCurveTo(-15, 0, -10, -10, 0, -10);
            
            let gradient = ctx.createLinearGradient(0, -10, 0, 10);
            gradient.addColorStop(0, 'rgba(255, 183, 197, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 20, 147, 0.6)');

            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.restore();
        }
    }

    function init2D() {
        resizeCanvas();
        petals = [];
        for (let i = 0; i < NUM_PETALS; i++) {
            petals.push(new Petal());
        }
    }

    function animate2D() {
        ctx.clearRect(0, 0, width, height);
        petals.forEach(petal => {
            petal.update();
            petal.draw();
        });
        requestAnimationFrame(animate2D);
    }

    window.addEventListener('resize', resizeCanvas);
    init2D();
    animate2D();
  </script>
</body>
</html>
